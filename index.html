<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸟类地球Online - 探索飞羽世界</title>
  <!-- Tailwind CSS CDN（辅助布局） -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 字体：Outfit 标题 + Nunito 正文 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/custom.css">
</head>
<body>

  <!-- 通用吸顶导航栏 -->
  <nav class="navbar">
    <div class="navbar-inner">
      <!-- Logo 预留 SVG 替换位 -->
      <a href="index.html" class="logo">
        <img src="data/pic/logo.svg" class="logo-icon" alt="Logo" /> <!--<span class="logo-icon">🐦</span> -->
        鸟类地球Online
      </a>
      <div class="nav-actions">
        <form class="search-form search-box">
          <span class="search-icon">🔍</span>
          <input type="search" class="search-input" placeholder="搜索鸟类..." aria-label="搜索鸟类">
        </form>
        <button class="nav-link about-btn">关于我们</button>
      </div>
    </div>
  </nav>

  <!-- 首页主体：1:2 左右分栏 -->
  <section class="hero">
    <div class="hero-inner">
      <!-- 左侧 1/3：网站名称 -->
      <div class="hero-text" data-parallax="0.03">
        <h1 class="font-display">鸟类地球<br>Online</h1>
        <p>点击右侧环形中的水滴，探索天空与大地上的飞羽朋友。每一颗水滴，都是一段自然故事。</p>
        <div style="margin-top:1.5rem;">
          <a href="list.html" class="btn-primary">查看全部图鉴</a>
        </div>
      </div>

      <!-- 右侧 2/3：水滴环形动画区域 -->
      <div class="hero-ring-area">
        <div id="ring-container" class="ring-container" aria-label="鸟类环形选择器">
          <!-- 由 orbit.js 动态生成 4 圈水滴 -->
        </div>
      </div>
    </div>
  </section>

  <script src="js/common.js"></script>
  <script src="js/orbit.js"></script>
</body>
</html>
